name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc
            cc: gcc-11
            cxx: g++-11
            build_type: Release
          - os: ubuntu-22.04
            compiler: gcc
            cc: gcc-11
            cxx: g++-11
            build_type: Debug
          - os: ubuntu-22.04
            compiler: clang
            cc: clang-14
            cxx: clang++-14
            build_type: Release
          - os: macos-13
            compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release
          - os: macos-14
            compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release
          - os: windows-2022
            compiler: msvc
            build_type: Release
          - os: windows-2022
            compiler: msvc
            build_type: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Set up environment (POSIX)
        if: matrix.os != 'windows-2022'
        run: |
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DXRTSYNC_BUILD_TESTS=ON -DXRTSYNC_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  ios-cross-compile:
    name: iOS cross-compile (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Configure for iOS
        run: |
          cmake -S . -B build-ios \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DXRTSYNC_BUILD_TESTS=OFF \
            -DXRTSYNC_BUILD_EXAMPLES=OFF
      - name: Build for iOS
        run: cmake --build build-ios --config Release -- -sdk iphoneos

  android-cross-compile:
    name: Android cross-compile (arm64-v8a)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
      - name: Configure for Android
        run: |
          cmake -S . -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DXRTSYNC_BUILD_TESTS=OFF \
            -DXRTSYNC_BUILD_EXAMPLES=OFF
      - name: Build for Android
        run: cmake --build build-android -j

  format-check:
    name: clang-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14
      - name: Run clang-format
        run: |
          find include src examples tests benchmarks -type f \( -name '*.h' -o -name '*.cc' \) \
            | xargs clang-format-14 --dry-run --Werror --style=file || true
